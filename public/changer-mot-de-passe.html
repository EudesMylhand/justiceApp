<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changement de mot de passe — Plateforme Justice &amp; Sécurité</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="ecran-connexion">

<div class="bandeau-officiel">
    <span class="republique">République du Congo</span>
    <span class="devise">Unité — Travail — Progrès</span>
</div>

<div class="contenu-connexion">
    <div class="carte-connexion">
        <div class="entete-connexion">
            <div class="emblem">RC</div>
            <h1>Changement de mot de passe requis</h1>
            <p>Pour des raisons de sécurité, veuillez définir un nouveau mot de passe avant de continuer</p>
        </div>
        <div class="corps-connexion">
            <div id="erreur-change" class="message-erreur"></div>
            <form id="form-change">
                <div class="champ">
                    <label for="new-password">Nouveau mot de passe</label>
                    <input type="password" id="new-password" minlength="8" autocomplete="new-password" required>
                </div>
                <div class="champ">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" minlength="8" autocomplete="new-password" required>
                </div>
                <button type="submit" class="bouton-principal" id="btn-change">Valider</button>
                <button type="button" class="bouton-secondaire" id="btn-deconnexion">Se déconnecter</button>
            </form>
        </div>
    </div>
</div>

<div class="pied-connexion">
    Plateforme Nationale de Justice &amp; Sécurité — Accès réservé aux personnels habilités.
</div>

<script src="/js/api.js"></script>
<script>
    if (!requireLoginOrRedirect()) { /* redirigé */ }

    document.getElementById('form-change').addEventListener('submit', async (e) => {
        e.preventDefault();
        masquerErreur('erreur-change');

        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
            afficherErreur('erreur-change', 'Les mots de passe ne correspondent pas.');
            return;
        }
        if (newPassword.length < 8) {
            afficherErreur('erreur-change', 'Le mot de passe doit contenir au moins 8 caractères.');
            return;
        }

        const btn = document.getElementById('btn-change');
        btn.disabled = true;

        try {
            const response = await apiFetch('/auth/password/change', {
                method: 'POST',
                body: JSON.stringify({ newPassword }),
            });
            if (!response) return;
            const data = await response.json();

            if (!response.ok) {
                afficherErreur('erreur-change', data.message || 'Une erreur est survenue.');
                return;
            }

            window.location.href = '/dashboard.html';
        } catch (err) {
            afficherErreur('erreur-change', 'Impossible de contacter le serveur.');
        } finally {
            btn.disabled = false;
        }
    });

    document.getElementById('btn-deconnexion').addEventListener('click', async () => {
        await apiFetch('/auth/logout', { method: 'POST' });
        Auth.redirectToLogin();
    });
</script>
</body>
</html>
